openapi: 3.0.3
info:
  title: Network Traffic Analysis
  description: |
    Network Insight offers a unified analytical platform for specific networks, such as private networks and slices, focusing exclusively on aggregated network-level data rather than individual device information.
    It empowers users to both evaluate the overall network health through a comprehensive, component-based scoring system and to analyze service traffic patterns with customizable granularity.
    By providing a holistic view-from infrastructure health to user traffic trends-this API suite delivers the critical, real-time data needed for comprehensive network monitoring, strategic performance optimization, and effective early warning systems.

    # Introduction
    The Network Traffic Analysis API utilizes DPI collection technology to capture communication traffic between all services or terminals within the network.
    By correlating service-specific data with devices and port resources, it aggregates and calculates the traffic flow for each service, thereby deriving service-based traffic distribution across the entire network.
    This data helps identify high-traffic services and traffic load conditions during different time periods, facilitating the provision of appropriate bandwidth for critical services through slicing technology, ultimately enabling efficient utilization of network resources.

    # API functionality
    The API provides the following functionality:
    - It allows users to directly query access traffic statistics for all services within a specified time period, including the number of accesses and the cumulative values of uplink and downlink traffic.

    # Request Parameters Definition:
    * **networkId**: Unique identifier of the analyzed network (UUID format).
    * **startDate**: Start date and time of the analysis period (RFC 3339 with timezone).
    * **endDate**: End date and time of the analysis period (RFC 3339 with timezone).
    * **frequency**: Analysis granularity (enumeration: 'DAY', 'HOUR').
    * **page**: Requested page number (1-indexed). Defaults to 1.
    * **perPage**: Number of items per page. Defaults to 20, maximum 100.

    # Application identification

    The `app` field in the response identifies the application detected via DPI.
    Application names are normalized by the platform (e.g., "whatsapp", "wechat", "netflix")
    and serve as stable identifiers for client-side filtering and correlation.
    API providers should document the list of possible application names and
    any normalization rules applied. Clients should not depend on case sensitivity
    or special character formatting; values are provided in lowercase with no
    special characters.

    # Privacy and Data Granularity

    This API provides per-application traffic breakdown obtained via DPI (Deep Packet Inspection).
    All data is aggregated at network level and does not contain individual device or user identifiers.
    API providers must ensure that per-application data cannot be re-identified to specific users or devices.

    The use of two-legged access tokens is recommended for this API, as no end-user personal data
    is processed. If local regulations require user consent for DPI-based application detection,
    three-legged tokens with appropriate scopes and consent pages must be implemented by the provider.

    # Error handling
    - `404 NOT_FOUND`: Returned when the specified `networkId` does not exist in the system.
    - `404 IDENTIFIER_NOT_FOUND`: Returned when the network exists but no traffic data is available for the requested time period (e.g., network not yet operational, or no traffic during the period). If the API provider cannot distinguish these cases, `404 NOT_FOUND` may be used for both.

    <!-- CAMARA:MANDATORY:authorization-and-authentication:BEGIN -->
    # Authorization and authentication

    The "Camara Security and Interoperability Profile" provides details of how an API consumer requests an access token. Please refer to Identity and Consent Management (https://github.com/camaraproject/IdentityAndConsentManagement/) for the released version of the profile.

    The specific authorization flows to be used will be agreed upon during the onboarding process, happening between the API consumer and the API provider, taking into account the declared purpose for accessing the API, whilst also being subject to the prevailing legal framework dictated by local legislation.

    In cases where personal data is processed by the API and users can exercise their rights through mechanisms such as opt-in and/or opt-out, the use of three-legged access tokens is mandatory. This ensures that the API remains in compliance with privacy regulations, upholding the principles of transparency and user-centric privacy-by-design.
    <!-- CAMARA:MANDATORY:authorization-and-authentication:END -->

    <!-- CAMARA:MANDATORY:request-body-strictness:BEGIN -->
    # Request body strictness

    This API rejects requests with JSON request bodies that contain properties not declared in this specification, at any nesting level. Unknown properties result in a `400 INVALID_ARGUMENT` response.
    <!-- CAMARA:MANDATORY:request-body-strictness:END -->

    <!-- CAMARA:MANDATORY:additional-error-responses:BEGIN -->
    # Additional CAMARA error responses

    The list of error codes in this API specification is not exhaustive. Therefore the API specification MAY not document some non-mandatory error statuses as indicated in `CAMARA API Design Guide`.

    Please refer to the `CAMARA_common.yaml` of the Commonalities Release associated to this API version for a complete list of error responses. The applicable Commonalities Release can be identified in the `API Readiness Checklist` document associated to this API version.

    As a specific rule, error `501 - NOT_IMPLEMENTED` can be only a possible error response if it is explicitly documented in the API.
    <!-- CAMARA:MANDATORY:additional-error-responses:END -->

