openapi: 3.0.3
info:
  title: Network Traffic Analysis
  description: |
    Network Insight offers a unified analytical platform for specific networks, such as private networks and slices, focusing exclusively on aggregated network-level data rather than individual device information.
    It empowers users to both evaluate the overall network health through a comprehensive, component-based scoring system and to analyze service traffic patterns with customizable granularity.
    By providing a holistic view-from infrastructure health to user traffic trends-this API suite delivers the critical, real-time data needed for comprehensive network monitoring, strategic performance optimization, and effective early warning systems.

    # Introduction
    The Network Traffic Analysis API utilizes DPI collection technology to capture communication traffic between all services or terminals within the network.
    By correlating service-specific data with devices and port resources, it aggregates and calculates the traffic flow for each service, thereby deriving service-based traffic distribution across the entire network.
    This data helps identify high-traffic services and traffic load conditions during different time periods, facilitating the provision of appropriate bandwidth for critical services through slicing technology, ultimately enabling efficient utilization of network resources.

    # API functionality
    The API provides the following functionality:
    - It allows users to directly query access traffic statistics for all services within a specified time period, including the number of accesses and the cumulative values of uplink and downlink traffic.

    # Request Parameters Definition:
    * **networkId**: Unique identifier of the analyzed network (UUID format).
    * **startDate**: Start date and time of the analysis period (RFC 3339 with timezone). For frequency=DAY, this is the start of the day (00:00:00). For frequency=HOUR, this is the start of the hour (HH:00:00).
    * **endDate**: End date and time of the analysis period (RFC 3339 with timezone). For frequency=DAY, this is the start of the next day (00:00:00). For frequency=HOUR, this is the start of the next hour (HH+1:00:00).
    * **frequency**: Analysis granularity (enumeration: 'DAY', 'HOUR').
    * **page**: Requested page number (1-indexed). Defaults to 1.
    * **perPage**: Number of items per page. Defaults to 20, maximum 100.

    # Application identification

    The `app` field in the response identifies the application detected via DPI.
    Application names are normalized by the platform (e.g., "whatsapp", "wechat", "netflix")
    and serve as stable identifiers for client-side filtering and correlation.
    API providers should document the list of possible application names and
    any normalization rules applied. Clients should not depend on case sensitivity
    or special character formatting; values are provided in lowercase with no
    special characters.

    # Privacy and Data Granularity

    This API provides per-application traffic breakdown obtained via DPI (Deep Packet Inspection).
    All data is aggregated at network level and does not contain individual device or user identifiers.
    API providers must ensure that per-application data cannot be re-identified to specific users or devices.

    The use of two-legged access tokens is recommended for this API, as no end-user personal data
    is processed. If local regulations require user consent for DPI-based application detection,
    three-legged tokens with appropriate scopes and consent pages must be implemented by the provider.

    # Error handling
    - `404 NOT FOUND`: Returned when the specified `networkId` does not exist in the system.

    Note: When the `networkId` exists but no traffic data is available for the requested period, the API returns `200 OK` with an empty `records` array. This is a successful response, not an error.

    <!-- CAMARA:MANDATORY:authorization-and-authentication:BEGIN -->
    # Authorization and authentication

    The "Camara Security and Interoperability Profile" provides details of how an API consumer requests an access token. Please refer to Identity and Consent Management (https://github.com/camaraproject/IdentityAndConsentManagement/) for the released version of the profile.

    The specific authorization flows to be used will be agreed upon during the onboarding process, happening between the API consumer and the API provider, taking into account the declared purpose for accessing the API, whilst also being subject to the prevailing legal framework dictated by local legislation.

    In cases where personal data is processed by the API and users can exercise their rights through mechanisms such as opt-in and/or opt-out, the use of three-legged access tokens is mandatory. This ensures that the API remains in compliance with privacy regulations, upholding the principles of transparency and user-centric privacy-by-design.
    <!-- CAMARA:MANDATORY:authorization-and-authentication:END -->

    <!-- CAMARA:MANDATORY:request-body-strictness:BEGIN -->
    # Request body strictness

    This API rejects requests with JSON request bodies that contain properties not declared in this specification, at any nesting level. Unknown properties result in a `400 INVALID_ARGUMENT` response.
    <!-- CAMARA:MANDATORY:request-body-strictness:END -->

    <!-- CAMARA:MANDATORY:additional-error-responses:BEGIN -->
    # Additional CAMARA error responses

    The list of error codes in this API specification is not exhaustive. Therefore the API specification MAY not document some non-mandatory error statuses as indicated in `CAMARA API Design Guide`.

    Please refer to the `CAMARA_common.yaml` of the Commonalities Release associated to this API version for a complete list of error responses. The applicable Commonalities Release can be identified in the `API Readiness Checklist` document associated to this API version.

    As a specific rule, error `501 - NOT_IMPLEMENTED` can be only a possible error response if it is explicitly documented in the API.
    <!-- CAMARA:MANDATORY:additional-error-responses:END -->
  version: 0.1.0
  x-camara-commonalities: 0.8.0
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
  - url: '{apiRoot}/network-traffic-analysis/v0.1'
    variables:
      apiRoot:
        default: http://localhost:9091
        description: API root, defined by the service provider, e.g. `api.example.com` or `api.example.com/somepath`
tags:
  - name: Network Traffic Analysis
    description: The API allows API consumers to query 5G traffic statistics information for aggregated network-level data.
externalDocs:
  description: Project documentation at CAMARA
  url: https://github.com/camaraproject/NetworkInsights
paths:
  /traffic-analysis:
    get:
      tags:
        - Network Traffic Analysis
      summary: Get network traffic analysis
      description: |
        Query 5G traffic statistics information for aggregated network-level data.
        If no data is available for the requested period, returns `200 OK` with an empty `records` array.
      operationId: getTrafficAnalysis
      security:
        - openId:
            - network-traffic-analysis:traffic-analysis:read
      parameters:
        - $ref: '#/components/parameters/x-correlator'
        - name: networkId
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/NetworkId'
          description: Unique identifier of the analyzed network (UUID format).
          example: 123e4567-e89b-12d3-a456-426614174000
        - name: startDate
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/DateTime'
          description: Start date and time of the analysis period (RFC 3339 with timezone).
          example: '2024-06-01T12:00:00Z'
        - name: endDate
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/DateTime'
          description: End date and time of the analysis period (RFC 3339 with timezone).
          example: '2024-07-01T12:00:00Z'
        - name: frequency
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/Frequency'
          description: Analysis granularity (time interval for aggregation).
          example: DAY
        - name: page
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/Page'
          description: Requested page number (1-indexed). Defaults to 1.
        - name: perPage
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/PerPage'
          description: Number of items per page. Defaults to 20, maximum 100.
      responses:
        '200':
          description: Successful response with network traffic analysis data. Returns empty `records` array if no data available.
          headers:
            x-correlator:
              $ref: '#/components/headers/x-correlator'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrafficAnalysisResponse'
              examples:
                Success:
                  $ref: '#/components/examples/TrafficAnalysisSuccess'
                EmptyResponse:
                  description: Example response when no traffic data is available
                  value:
                    records: []
                    pagination:
                      page: 1
                      perPage: 20
                      totalCount: 0
                      totalPages: 0
        '400':
          $ref: '#/components/responses/Generic400'
        '401':
          $ref: '#/components/responses/Generic401'
        '403':
          $ref: '#/components/responses/Generic403'
        '404':
          $ref: '#/components/responses/Generic404'
components:
  securitySchemes:
    openId:
      description: OpenID Connect authentication
      type: openIdConnect
      openIdConnectUrl: https://example.com/.well-known/openid-configuration
  parameters:
    x-correlator:
      name: x-correlator
      in: header
      description: Correlation id for the different services
      schema:
        $ref: '#/components/schemas/XCorrelator'
  headers:
    x-correlator:
      description: Correlation id for the different services
      schema:
        $ref: '#/components/schemas/XCorrelator'
  schemas:
    NetworkId:
      description: Network ID in UUID format (unique identifier of the analyzed network)
      type: string
      format: uuid
      maxLength: 36
      example: 123e4567-e89b-12d3-a456-426614174000
    Frequency:
      description: Analysis granularity (time interval for aggregation)
      type: string
      enum:
        - DAY
        - HOUR
      example: DAY
    TrafficAnalysisResponse:
      type: object
      description: Response schema for traffic analysis. Returns empty `records` array if no data available.
      required:
        - records
        - pagination
      properties:
        records:
          type: array
          description: Array of traffic records for the current page. Empty array if no data available.
          minItems: 0
          maxItems: 100
          items:
            type: object
            description: Traffic record for a single application
            properties:
              app:
                type: string
                description: |
                  Application identifier as recognized by the DPI system.
                  Names are normalized (lowercase, no special characters) for consistency.
                  The set of possible values is provider-specific but should be documented and stable.
                  API consumers can use this field directly for filtering or correlation.
                example: whatsapp
                maxLength: 128
              ipv4Address:
                type: string
                description: Application server IPv4 address
                example: 202.112.17.122
                format: ipv4
                maxLength: 15
              description:
                type: string
                description: Application description
                example: A free cross-platform app for messaging, calls, and media sharing.
                maxLength: 512
              accessCount:
                type: integer
                description: Total number of accesses to the application
                format: int64
                minimum: 0
                maximum: 9223372036854776000
                example: 150
              accessUpFlow:
                type: integer
                description: Total upstream traffic (bytes)
                format: int64
                minimum: 0
                maximum: 9223372036854776000
                example: 102400
              accessDownFlow:
                type: integer
                description: Total downstream traffic (bytes)
                format: int64
                minimum: 0
                maximum: 9223372036854776000
                example: 204800
              accessFlow:
                type: integer
                description: Total traffic (up + down, bytes)
                format: int64
                minimum: 0
                maximum: 9223372036854776000
                example: 307200
              startDate:
                allOf:
                  - $ref: '#/components/schemas/DateTime'
                description: Start of the aggregation period for this record (inclusive). For frequency=DAY, this is the start of the day (00:00:00). For frequency=HOUR, this is the start of the hour (HH:00:00).
              endDate:
                allOf:
                  - $ref: '#/components/schemas/DateTime'
                description: End of the aggregation period for this record (exclusive). For frequency=DAY, this is the start of the next day (00:00:00). For frequency=HOUR, this is the start of the next hour (HH+1:00:00).
              accessDate:
                type: string
                format: date
                description: The calendar date of the record (YYYY-MM-DD). For frequency=HOUR, this is the date of the hour; multiple records with the same accessDate may exist for different hours.
                example: '2024-06-07'
                pattern: ^\d{4}-\d{2}-\d{2}$
                maxLength: 10
        pagination:
          $ref: '#/components/schemas/Pagination'
    XCorrelator:
      type: string
      description: Correlator string, UUID format recommended but any string matching the pattern can be used
      pattern: ^[a-zA-Z0-9-_:;.\/<>{}]{0,256}$
      maxLength: 256
      example: b4333c46-49c0-4f62-80d7-f0ef930f1c46
    DateTime:
      type: string
      format: date-time
      maxLength: 64
      description: Timestamp. It must follow [RFC 3339](https://datatracker.ietf.org/doc/html/rfc3339#section-5.6) and must have time zone.
      example: '2018-04-05T17:31:00Z'
    Page:
      type: integer
      format: int32
      minimum: 1
      maximum: 2147483647
      default: 1
      description: Current page number (1-indexed).
      example: 1
    PerPage:
      type: integer
      format: int32
      minimum: 1
      maximum: 100
      default: 20
      description: Number of items per page.
      example: 20
    TotalCount:
      type: integer
      format: int32
      minimum: 0
      maximum: 2147483647
      description: Total number of items matching the query, after filters applied. MAY be omitted where a full count query is prohibitively expensive.
      example: 87
    TotalPages:
      type: integer
      format: int32
      minimum: 0
      maximum: 2147483647
      description: Total number of pages. Equals ceil(totalCount / perPage). MAY be omitted where totalCount is omitted.
      example: 5
    Pagination:
      description: Pagination details helping to navigate through paged results efficiently.
      type: object
      properties:
        page:
          $ref: '#/components/schemas/Page'
        perPage:
          $ref: '#/components/schemas/PerPage'
        totalCount:
          $ref: '#/components/schemas/TotalCount'
        totalPages:
          $ref: '#/components/schemas/TotalPages'
    ErrorInfo:
      type: object
      description: A structured error response providing details about a failed request, including the HTTP status code, an error code, and a human-readable message
      required:
        - status
        - code
        - message
      properties:
        status:
          type: integer
          format: int32
          minimum: 100
          maximum: 599
          description: HTTP response status code
        code:
          type: string
          maxLength: 96
          description: A human-readable code to describe the error
        message:
          type: string
          maxLength: 512
          description: A human-readable description of what the event represents
  responses:
    Generic400:
      description: Bad Request
      headers:
        x-correlator:
          $ref: '#/components/headers/x-correlator'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorInfo'
          examples:
            GENERIC_400_INVALID_ARGUMENT:
              description: Invalid Argument. Generic Syntax Exception
              value:
                status: 400
                code: INVALID_ARGUMENT
                message: Client specified an invalid argument, request body or query param.
            GENERIC_400_OUT_OF_RANGE:
              description: Out of Range. Specific Syntax Exception used when a given field has a pre-defined range or a invalid filter criteria combination is requested
              value:
                status: 400
                code: OUT_OF_RANGE
                message: Client specified an invalid range.
    Generic401:
      description: Unauthorized
      headers:
        x-correlator:
          $ref: '#/components/headers/x-correlator'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorInfo'
          examples:
            GENERIC_401_UNAUTHENTICATED:
              description: Request cannot be authenticated and a new authentication is required
              value:
                status: 401
                code: UNAUTHENTICATED
                message: Request not authenticated due to missing, invalid, or expired credentials. A new authentication is required.
    Generic403:
      description: Forbidden
      headers:
        x-correlator:
          $ref: '#/components/headers/x-correlator'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorInfo'
          examples:
            GENERIC_403_PERMISSION_DENIED:
              description: Permission denied. OAuth2 token access does not have the required scope or when the user fails operational security
              value:
                status: 403
                code: PERMISSION_DENIED
                message: Client does not have sufficient permissions to perform this action.
    Generic404:
      description: Not found
      headers:
        x-correlator:
          $ref: '#/components/headers/x-correlator'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorInfo'
          examples:
            GENERIC_404_NOT_FOUND:
              description: Resource is not found
              value:
                status: 404
                code: NOT_FOUND
                message: The specified resource is not found.
  examples:
    TrafficAnalysisSuccess:
      description: Successful traffic analysis response example
      value:
        records:
          - app: whatsapp
            ipv4Address: 202.112.17.122
            description: A free cross-platform app for messaging, calls, and media sharing.
            accessCount: 150
            accessUpFlow: 102400
            accessDownFlow: 204800
            accessFlow: 307200
            startDate: '2024-06-07T00:00:00Z'
            endDate: '2024-06-07T23:59:59Z'
            accessDate: '2024-06-07'
        pagination:
          page: 1
          perPage: 20
          totalCount: 22
          totalPages: 2
